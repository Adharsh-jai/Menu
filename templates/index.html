<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Menu — La Maison Restaurant</title>
    <meta name="description" content="Explore our exquisite menu featuring handcrafted dishes across multiple categories. La Maison Restaurant — fine dining at its best.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

    <!-- ═══ AMBIENT BLUR BLOBS ═══ -->
    <div class="ambient-blobs" aria-hidden="true">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <!-- ═══ HEADER ═══ -->
    <header id="site-header">
        <div class="header-inner">
            <div class="logo">
                <span class="logo-icon">🍽️</span>
                <h1>La Maison</h1>
            </div>
            <p class="tagline">Experience Culinary Excellence</p>
        </div>
    </header>

    <!-- ═══ HERO ═══ -->
    <section id="hero">
        <div class="hero-bg-img"></div>
        <div class="hero-overlay"></div>
        <!-- Floating food emojis -->
        <div class="floating-foods" aria-hidden="true">
            <span class="float-item" style="--i:0">🍊</span>
            <span class="float-item" style="--i:1">🍇</span>
            <span class="float-item" style="--i:2">🌿</span>
            <span class="float-item" style="--i:3">🍋</span>
            <span class="float-item" style="--i:4">🍓</span>
            <span class="float-item" style="--i:5">🫒</span>
            <span class="float-item" style="--i:6">🌶️</span>
            <span class="float-item" style="--i:7">🥑</span>
            <span class="float-item" style="--i:8">🍎</span>
            <span class="float-item" style="--i:9">🫐</span>
        </div>
        <div class="hero-content">
            <h2>Our Menu</h2>
            <p>Freshly crafted dishes made with passion &amp; the finest ingredients</p>
        </div>
    </section>

    <!-- ═══ SEARCH BAR ═══ -->
    <div id="search-bar">
        <div class="search-wrap">
            <span class="search-icon">🔍</span>
            <input type="text" id="searchInput" placeholder="Search dishes..." autocomplete="off">
            <button class="search-clear hidden" id="searchClear">&times;</button>
        </div>
    </div>

    <!-- ═══ CATEGORY FILTER + VIEW SWITCHER ═══ -->
    <nav id="category-nav">
        <div class="nav-toolbar">
            <div class="category-tabs" id="categoryTabs">
                <button class="cat-tab active" data-cat="all">All</button>
                <!-- tabs injected by JS -->
            </div>
            <select class="category-dropdown" id="categoryDropdown">
                <option value="all" selected>All Categories</option>
                <!-- options injected by JS -->
            </select>
            <div class="view-switcher" id="viewSwitcher">
                <button class="view-btn active" data-view="list" title="List View">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                </button>
                <button class="view-btn" data-view="medium" title="Medium Grid">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
                </button>
            </div>
        </div>
    </nav>

    <!-- ═══ MENU GRID ═══ -->
    <main id="menu-section">
        <div id="menuContainer">
            <!-- populated by JS -->
        </div>
        <div id="emptyState" class="empty-state hidden">
            <span class="empty-icon">🍴</span>
            <p>No items to display yet. Check back soon!</p>
        </div>
    </main>

    <!-- ═══ FOOTER ═══ -->
    <footer id="site-footer">
        <p>&copy; 2026 La Maison Restaurant. All rights reserved.</p>
    </footer>

    <script src="/static/js/main.js"></script>
</body>
</html>
